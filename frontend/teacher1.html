<!DOCTYPE html>
<html>

<head>

<title>Teacher Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

</head>

<body>

<h1>Teacher Dashboard</h1>

<!-- ========================= -->
<!-- QR CODE (ADD THIS 🔥) -->
<!-- ========================= -->

<h3>Scan to Join Class</h3>

<img id="qrCode" width="200">

<p>Students scan this to join</p>

<hr>

<!-- ========================= -->
<!-- TEACHER CAMERA -->
<!-- ========================= -->

<h3>Teacher Camera</h3>

<video id="localVideo" autoplay playsinline width="420"></video>

<div>

<button onclick="toggleMic()">🎤 Mic</button>
<button onclick="toggleCamera()">📷 Camera</button>

</div>

<!-- ========================= -->
<!-- STUDENT CAMERA -->
<!-- ========================= -->

<h3>Student Camera</h3>

<video id="remoteVideo" autoplay playsinline width="420"></video>

<!-- ========================= -->
<!-- LOAD QR -->
<!-- ========================= -->

<script>
document.getElementById("qrCode").src =
    "http://192.168.1.9:5000/qr"
</script>

<script src="js/video.js"></script>
<script src="js/main.js"></script>

</body>

</html>
